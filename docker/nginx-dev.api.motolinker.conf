# Plik: /etc/nginx/sites-available/dev.api.motolinker.grzesiak24.pl

server {
    listen 80;
    server_name dev.api.motolinker.grzesiak24.pl;

    # Logi (opcjonalnie, ale mocno zalecane)
    access_log /var/log/nginx/dev.api.motolinker.access.log;
    error_log /var/log/nginx/dev.api.motolinker.error.log;

    location / {
        # Zmień port 8080 na ten, który wystawiłeś w dockera dla aplikacji (app)
        proxy_pass http://motolinker_backend_prod:80
        
        # Przekazywanie prawdziwych nagłówków klienta do kontenera
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Ustawienia timeoutów przy dużych plikach/długich requestach
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }
}
