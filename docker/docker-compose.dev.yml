services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: motolinker_backend
    env_file:
      - env.docker
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - composer_cache:/tmp/composer
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  db:
    image: mysql:8.0
    container_name: motolinker_db
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    environment:
      MYSQL_DATABASE: motolinker
      MYSQL_USER: symfony
      MYSQL_PASSWORD: symfony
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - motolinker_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  motolinker_db_data:
  composer_cache:

