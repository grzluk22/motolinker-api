upload_max_filesize = 10G
post_max_size = 10G
memory_limit = -1
max_execution_time = 0
max_input_time = 0

; Performance tuning
opcache.enable=1
opcache.memory_consumption=256
opcache.max_accelerated_files=20000
opcache.validate_timestamps=1
opcache.revalidate_freq=0

; Xdebug is not installed by default to maximize performance.
; If you need it, install it in Dockerfile and enable it here.

; Realpath cache is critical for Docker on Windows
realpath_cache_size = 4096k
realpath_cache_ttl = 600
